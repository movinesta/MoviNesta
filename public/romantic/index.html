<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="theme-color" content="#6f1746" />
  <title>رسالة رومانسية صوتية</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:22px;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,sans-serif;background:radial-gradient(circle at top,#c15b86 0,#741a49 48%,#310b25 100%);color:#fff;text-align:center}.card{width:min(560px,100%);padding:32px 22px;border:1px solid rgba(255,255,255,.22);border-radius:28px;background:rgba(38,8,29,.48);box-shadow:0 24px 70px rgba(0,0,0,.35);backdrop-filter:blur(14px)}.heart{font-size:58px;line-height:1;margin-bottom:12px}h1{font-size:clamp(24px,6vw,36px);margin:0 0 16px}.phrase{min-height:96px;display:grid;place-items:center;font-size:clamp(20px,5vw,29px);line-height:1.65;font-weight:750;margin:0 0 20px}audio{width:100%;margin:0 0 16px}button,a.play{display:block;width:100%;border:0;border-radius:18px;padding:17px 18px;font:inherit;font-size:20px;font-weight:800;color:#5c123d;background:#fff;cursor:pointer;text-decoration:none;box-shadow:0 10px 26px rgba(0,0,0,.22)}button:active,a.play:active{transform:scale(.98)}a.play{margin-top:12px;background:#f8d9e6}.note{margin:16px 0 0;font-size:14px;opacity:.86;line-height:1.7}.status{min-height:24px;margin:10px 0;font-size:15px}
  </style>
</head>
<body>
  <main class="card">
    <div class="heart">❤</div>
    <h1>رسالة رومانسية لك</h1>
    <div id="phrase" class="phrase" aria-live="polite"></div>
    <audio id="audio" controls preload="auto" autoplay></audio>
    <button id="play" type="button">تشغيل الصوت</button>
    <a id="direct" class="play" href="#" rel="noreferrer">فتح الصوت مباشرة</a>
    <div id="status" class="status"></div>
    <p class="note">كل مرة تفتح هذا الرابط تُختار رسالة مختلفة. بعض الهواتف تمنع الصوت التلقائي، لذلك اضغط «تشغيل الصوت» مرة واحدة.</p>
  </main>
  <script>
    const phrases = [
      "وجودك في حياتي يجعل كل يوم أجمل من الذي قبله.",
      "أحبك لأنك الأمان الذي أبحث عنه، والفرح الذي لا ينتهي.",
      "حين أسمع صوتك، أشعر أن العالم أصبح مكانًا أهدأ وأجمل.",
      "أنت أجمل صدفة، وأغلى شخص اختاره قلبي.",
      "كل تفاصيلك قريبة من قلبي، حتى الأشياء الصغيرة التي لا يلاحظها أحد.",
      "قربك يكفيني لأشعر أنني أملك الدنيا كلها.",
      "لو كان للحب اسم آخر، لاخترت اسمك.",
      "أنت النور الذي يجعل أيامي أكثر دفئًا ووضوحًا.",
      "أحب الطريقة التي يصبح بها كل شيء بسيطًا وجميلًا عندما تكون معي.",
      "مهما تغيّرت الأيام، سيبقى مكانك في قلبي ثابتًا.",
      "ابتسامتك هي الشيء الذي أود أن أراه في بداية كل يوم.",
      "معك لا أحتاج إلى أمنيات كثيرة؛ وجودك أجمل أمنية.",
      "أنت الشخص الذي يجعل قلبي يبتسم من دون سبب.",
      "أحبك بهدوء عميق، وبقلب يختارك كل مرة.",
      "حين أفكر في السعادة، أول ما يخطر في بالي هو أنت.",
      "أنت حكاية جميلة لا أريد لها نهاية.",
      "صوتك وطن صغير أعود إليه كلما أرهقتني الحياة.",
      "أحب حضورك الذي يملأ قلبي طمأنينة وحنانًا.",
      "يكفيني أنك هنا، فهذا وحده يجعل كل شيء أفضل.",
      "قلبي يعرفك كما لو أنه خُلق ليجدك.",
      "أنت أجمل جزء في يومي، وألطف فكرة في قلبي.",
      "أحبك أكثر مما تستطيع الكلمات أن تشرح.",
      "كل مرة أراك فيها، أشعر أن قلبي اختارك من جديد.",
      "أنت السبب الجميل خلف كثير من ابتساماتي.",
      "وجودك بجانبي هو أجمل شكل من أشكال السعادة."
    ];

    const phrase = phrases[Math.floor(Math.random() * phrases.length)];
    const audioUrl = "https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=ar&q=" + encodeURIComponent(phrase);
    const phraseEl = document.getElementById("phrase");
    const audio = document.getElementById("audio");
    const play = document.getElementById("play");
    const direct = document.getElementById("direct");
    const status = document.getElementById("status");

    phraseEl.textContent = phrase;
    audio.src = audioUrl;
    direct.href = audioUrl;

    function playAudio() {
      status.textContent = "جارٍ تحميل الصوت…";
      audio.load();
      const attempt = audio.play();
      if (attempt && typeof attempt.then === "function") {
        attempt.then(() => {
          status.textContent = "يعمل الصوت الآن";
          play.textContent = "إعادة تشغيل الصوت";
        }).catch(() => {
          status.textContent = "اضغط «فتح الصوت مباشرة» إذا لم يبدأ التشغيل.";
        });
      }
    }

    play.addEventListener("click", playAudio);
    audio.addEventListener("playing", () => {
      status.textContent = "يعمل الصوت الآن";
      play.textContent = "إعادة تشغيل الصوت";
    });
    audio.addEventListener("error", () => {
      status.textContent = "تعذر تشغيله داخل الصفحة؛ استخدم زر «فتح الصوت مباشرة».";
    });
    setTimeout(() => audio.play().catch(() => {}), 350);
  </script>
</body>
</html>
